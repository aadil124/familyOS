version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: familyos_db
    environment:
      POSTGRES_USER: familyos_user
      POSTGRES_PASSWORD: familyos_password
      POSTGRES_DB: familyos_db
    ports:
      - "55325:5432"
    volumes:
      - familyos_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U familyos_user -d familyos_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: familyos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@familyos.ai
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  familyos_pgdata:
